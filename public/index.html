<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }
    header {
      padding: 24px 32px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #21262d;
    }
    header h1 { font-size: 24px; font-weight: 600; }
    .time-controls {
      display: flex;
      gap: 6px;
      background: #161b22;
      padding: 4px;
      border-radius: 8px;
    }
    .time-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #8b949e;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .time-btn:hover { color: #e1e4e8; }
    .time-btn.active { background: #238636; color: #fff; }
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 24px 32px;
    }
    .card {
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #21262d;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 20px 0;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
    }
    .card-price {
      font-size: 18px;
      font-weight: 700;
      color: #3fb950;
    }
    .card-subtitle {
      padding: 2px 20px 8px;
      font-size: 12px;
      color: #484f58;
    }
    .chart-wrap {
      height: 320px;
    }
    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr; }
      header { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Stock Dashboard</h1>
    <div class="time-controls" id="timeControls">
      <button class="time-btn" data-range="1D">1D</button>
      <button class="time-btn" data-range="1W">1W</button>
      <button class="time-btn" data-range="1M">1M</button>
      <button class="time-btn" data-range="3M">3M</button>
      <button class="time-btn" data-range="6M">6M</button>
      <button class="time-btn" data-range="1Y">1Y</button>
      <button class="time-btn active" data-range="5Y">5Y</button>
      <button class="time-btn" data-range="ALL">ALL</button>
    </div>
  </header>

  <div class="dashboard" id="dashboard">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Bitcoin / USD</div>
        <div class="card-price" id="price-btc">--</div>
      </div>
      <div class="card-subtitle">BITSTAMP:BTCUSD</div>
      <div class="chart-wrap" id="chart-btc"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Vanguard Total World Stock ETF</div>
        <div class="card-price" id="price-vt">--</div>
      </div>
      <div class="card-subtitle">AMEX:VT</div>
      <div class="chart-wrap" id="chart-vt"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">S&P 500</div>
        <div class="card-price" id="price-sp500">--</div>
      </div>
      <div class="card-subtitle">TVC:SPX</div>
      <div class="chart-wrap" id="chart-sp500"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Gold / USD</div>
        <div class="card-price" id="price-gold">--</div>
      </div>
      <div class="card-subtitle">OANDA:XAUUSD</div>
      <div class="chart-wrap" id="chart-gold"></div>
    </div>
  </div>

  <script>
    const CHARTS = [
      { containerId: 'chart-btc', symbol: 'BITSTAMP:BTCUSD' },
      { containerId: 'chart-vt', symbol: 'AMEX:VT' },
      { containerId: 'chart-sp500', symbol: 'TVC:SPX' },
      { containerId: 'chart-gold', symbol: 'OANDA:XAUUSD' }
    ];

    let currentRange = '5Y';

    function getIntervalForRange(range) {
      const map = {
        '1D': '5',
        '1W': '15',
        '1M': 'D',
        '3M': 'D',
        '6M': 'W',
        '1Y': 'W',
        '5Y': 'M',
        'ALL': 'M'
      };
      return map[range] || 'D';
    }

    function getRangeValue(range) {
      const map = {
        '1D': '1D',
        '1W': '5D',
        '1M': '1M',
        '3M': '3M',
        '6M': '6M',
        '1Y': '12M',
        '5Y': '60M',
        'ALL': 'ALL'
      };
      return map[range] || '1M';
    }

    function renderCharts() {
      CHARTS.forEach(chart => {
        const container = document.getElementById(chart.containerId);
        container.innerHTML = '';

        const widgetConfig = {
          autosize: true,
          symbol: chart.symbol,
          interval: getIntervalForRange(currentRange),
          range: getRangeValue(currentRange),
          timezone: 'Etc/UTC',
          theme: 'dark',
          style: '3',
          locale: 'en',
          backgroundColor: '#161b22',
          gridColor: '#21262d',
          hide_top_toolbar: true,
          hide_legend: false,
          save_image: false,
          hide_volume: true,
          allow_symbol_change: false
        };

        const script = document.createElement('script');
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
        script.type = 'text/javascript';
        script.async = true;
        script.textContent = JSON.stringify(widgetConfig);

        const widgetDiv = document.createElement('div');
        widgetDiv.className = 'tradingview-widget-container';
        widgetDiv.style.height = '100%';
        widgetDiv.style.width = '100%';

        const innerDiv = document.createElement('div');
        innerDiv.className = 'tradingview-widget-container__widget';
        innerDiv.style.height = '100%';
        innerDiv.style.width = '100%';

        widgetDiv.appendChild(innerDiv);
        widgetDiv.appendChild(script);
        container.appendChild(widgetDiv);
      });
    }

    document.getElementById('timeControls').addEventListener('click', (e) => {
      if (!e.target.classList.contains('time-btn')) return;
      document.querySelector('.time-btn.active').classList.remove('active');
      e.target.classList.add('active');
      currentRange = e.target.dataset.range;
      renderCharts();
    });

    renderCharts();

    // Fetch live prices from server proxy
    async function loadPrices() {
      try {
        const res = await fetch('/api/prices');
        const data = await res.json();
        if (data.BTC) document.getElementById('price-btc').textContent = '$' + Math.round(data.BTC).toLocaleString();
        if (data.VT) document.getElementById('price-vt').textContent = '$' + Number(data.VT).toFixed(2);
        if (data.SP500) document.getElementById('price-sp500').textContent = '$' + Number(data.SP500).toFixed(2);
        if (data.GOLD) document.getElementById('price-gold').textContent = '$' + Number(data.GOLD).toFixed(2);
      } catch (e) {
        console.error('Price fetch failed:', e);
      }
    }
    loadPrices();
  </script>
</body>
</html>
