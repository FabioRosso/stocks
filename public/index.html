<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }
    header {
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #21262d;
    }
    header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .time-controls {
      display: flex;
      gap: 6px;
      background: #161b22;
      padding: 4px;
      border-radius: 8px;
    }
    .time-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: #8b949e;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .time-btn:hover { color: #e1e4e8; }
    .time-btn.active {
      background: #238636;
      color: #fff;
    }
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 24px 32px;
    }
    .card {
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #21262d;
      padding: 20px;
      position: relative;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
    }
    .card-price {
      font-size: 22px;
      font-weight: 700;
    }
    .card-change {
      font-size: 14px;
      margin-left: 8px;
    }
    .positive { color: #3fb950; }
    .negative { color: #f85149; }
    .chart-container {
      position: relative;
      height: 250px;
    }
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(22, 27, 34, 0.8);
      border-radius: 12px;
      z-index: 10;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #21262d;
      border-top-color: #238636;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-updated {
      text-align: center;
      padding: 16px;
      color: #484f58;
      font-size: 13px;
    }
    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr; }
      header { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Stock Dashboard</h1>
    <div class="time-controls">
      <button class="time-btn" data-range="1d" data-interval="5m">1D</button>
      <button class="time-btn" data-range="5d" data-interval="15m">1W</button>
      <button class="time-btn active" data-range="1mo" data-interval="1d">1M</button>
      <button class="time-btn" data-range="3mo" data-interval="1d">3M</button>
      <button class="time-btn" data-range="6mo" data-interval="1d">6M</button>
      <button class="time-btn" data-range="1y" data-interval="1wk">1Y</button>
      <button class="time-btn" data-range="5y" data-interval="1mo">5Y</button>
    </div>
  </header>

  <div class="dashboard" id="dashboard"></div>
  <div class="last-updated" id="lastUpdated"></div>

  <script>
    const STOCKS = [
      { symbol: 'BTC-USD', name: 'Bitcoin / USD', color: '#f7931a' },
      { symbol: 'VT', name: 'Vanguard Total World Stock ETF', color: '#3b82f6' },
      { symbol: '^GSPC', name: 'S&P 500', color: '#8b5cf6' },
      { symbol: 'GC=F', name: 'Gold / USD', color: '#eab308' }
    ];

    const charts = {};
    let currentRange = '1mo';
    let currentInterval = '1d';

    function createCards() {
      const dashboard = document.getElementById('dashboard');
      dashboard.innerHTML = STOCKS.map(s => `
        <div class="card" id="card-${CSS.escape(s.symbol)}">
          <div class="loading-overlay" id="loader-${CSS.escape(s.symbol)}">
            <div class="spinner"></div>
          </div>
          <div class="card-header">
            <div>
              <div class="card-title">${s.name}</div>
              <div style="color:#484f58;font-size:13px">${s.symbol}</div>
            </div>
            <div style="text-align:right">
              <span class="card-price" id="price-${CSS.escape(s.symbol)}">--</span>
              <span class="card-change" id="change-${CSS.escape(s.symbol)}"></span>
            </div>
          </div>
          <div class="chart-container">
            <canvas id="chart-${CSS.escape(s.symbol)}"></canvas>
          </div>
        </div>
      `).join('');
    }

    async function fetchData(symbol, range, interval) {
      const res = await fetch(`/api/chart/${encodeURIComponent(symbol)}?range=${range}&interval=${interval}`);
      const json = await res.json();
      const result = json.chart.result[0];
      const timestamps = result.timestamp;
      const closes = result.indicators.quote[0].close;
      const meta = result.meta;
      return { timestamps, closes, meta };
    }

    function formatPrice(price, symbol) {
      if (price == null) return '--';
      if (symbol === 'BTC-USD') return '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 });
      return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function renderChart(stock, data) {
      const id = CSS.escape(stock.symbol);
      const canvas = document.getElementById(`chart-${id}`);

      const points = data.timestamps
        .map((t, i) => ({ x: t * 1000, y: data.closes[i] }))
        .filter(p => p.y != null);

      const currentPrice = points.length ? points[points.length - 1].y : null;
      const firstPrice = points.length ? points[0].y : null;
      const change = currentPrice && firstPrice ? ((currentPrice - firstPrice) / firstPrice * 100) : 0;
      const isPositive = change >= 0;

      document.getElementById(`price-${id}`).textContent = formatPrice(currentPrice, stock.symbol);
      const changeEl = document.getElementById(`change-${id}`);
      changeEl.textContent = `${isPositive ? '+' : ''}${change.toFixed(2)}%`;
      changeEl.className = `card-change ${isPositive ? 'positive' : 'negative'}`;

      const gradient = canvas.getContext('2d').createLinearGradient(0, 0, 0, 250);
      gradient.addColorStop(0, stock.color + '40');
      gradient.addColorStop(1, stock.color + '00');

      if (charts[stock.symbol]) {
        charts[stock.symbol].data.datasets[0].data = points;
        charts[stock.symbol].data.datasets[0].borderColor = stock.color;
        charts[stock.symbol].data.datasets[0].backgroundColor = gradient;
        charts[stock.symbol].update('none');
      } else {
        charts[stock.symbol] = new Chart(canvas, {
          type: 'line',
          data: {
            datasets: [{
              data: points,
              borderColor: stock.color,
              backgroundColor: gradient,
              borderWidth: 2,
              fill: true,
              pointRadius: 0,
              pointHitRadius: 10,
              tension: 0.1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                label: ctx => formatPrice(ctx.parsed.y, stock.symbol),
                title: ctx => new Date(ctx[0].parsed.x).toLocaleDateString('en-US', {
                  month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
                })
              }
            }},
            scales: {
              x: {
                type: 'time',
                grid: { color: '#21262d' },
                ticks: { color: '#484f58', maxTicksLimit: 6, font: { size: 11 } },
                border: { color: '#21262d' }
              },
              y: {
                grid: { color: '#21262d' },
                ticks: {
                  color: '#484f58',
                  font: { size: 11 },
                  callback: v => stock.symbol === 'BTC-USD' ? '$' + (v/1000).toFixed(0) + 'k' : '$' + v.toLocaleString()
                },
                border: { color: '#21262d' }
              }
            },
            interaction: { mode: 'index', intersect: false }
          }
        });
      }

      document.getElementById(`loader-${id}`).style.display = 'none';
    }

    async function loadAll() {
      STOCKS.forEach(s => {
        const id = CSS.escape(s.symbol);
        const loader = document.getElementById(`loader-${id}`);
        if (loader) loader.style.display = 'flex';
      });

      const results = await Promise.allSettled(
        STOCKS.map(s => fetchData(s.symbol, currentRange, currentInterval))
      );

      results.forEach((result, i) => {
        if (result.status === 'fulfilled') {
          renderChart(STOCKS[i], result.value);
        } else {
          const id = CSS.escape(STOCKS[i].symbol);
          document.getElementById(`loader-${id}`).innerHTML =
            `<span style="color:#f85149">Failed to load</span>`;
        }
      });

      document.getElementById('lastUpdated').textContent =
        `Last updated: ${new Date().toLocaleString()}`;
    }

    // Time period buttons
    document.querySelectorAll('.time-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.time-btn.active').classList.remove('active');
        btn.classList.add('active');
        currentRange = btn.dataset.range;
        currentInterval = btn.dataset.interval;
        loadAll();
      });
    });

    // Init
    createCards();
    loadAll();
  </script>
</body>
</html>
